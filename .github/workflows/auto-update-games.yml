name: Auto Update Games

on:
  schedule:
    # Live scoring: Every 5 minutes during typical college football game hours
    # IMPORTANT: GitHub Actions cron can be delayed 10-15 min during high load
    # New workflows may take up to 1 hour before first auto-trigger

    # Thursday 6pm - midnight CT = Friday 00:00 - 06:00 UTC
    - cron: '*/5 0-6 * * 5'

    # Friday 6pm - midnight CT = Saturday 00:00 - 06:00 UTC
    - cron: '*/5 0-6 * * 6'

    # Saturday 11am - midnight CT = Saturday 17:00 - Sunday 06:00 UTC
    - cron: '*/5 17-23 * * 6'
    - cron: '*/5 0-6 * * 0'

    # Sunday 12am - 8am CT (for late Saturday games) = Sunday 06:00 - 14:00 UTC
    - cron: '*/5 6-14 * * 0'

    # Game statistics: Saturday 11am CT = Saturday 16:00 UTC
    - cron: '0 16 * * 6'

  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      function:
        description: 'Which function to trigger'
        required: true
        type: choice
        options:
          - live-score-updater
          - update-game-stats
          - both

# Ensure workflow has necessary permissions
permissions:
  contents: read

jobs:
  update-games:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevent hung workflows

    steps:
      - name: Determine which function to call
        id: determine-function
        run: |
          # For scheduled runs, determine based on time
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            DAY=$(date -u +%u)  # 1=Monday, 7=Sunday

            # Game statistics run on Saturday at 16:00 UTC
            if [ "$DAY" = "6" ] && [ "$HOUR" = "16" ]; then
              echo "function=update-game-stats" >> $GITHUB_OUTPUT
            else
              # All other times are live scoring
              echo "function=live-score-updater" >> $GITHUB_OUTPUT
            fi
          else
            # Manual trigger
            echo "function=${{ github.event.inputs.function }}" >> $GITHUB_OUTPUT
          fi

      - name: Call live-score-updater Edge Function
        if: steps.determine-function.outputs.function == 'live-score-updater' || steps.determine-function.outputs.function == 'both'
        run: |
          echo "🔄 Calling live-score-updater..."

          response=$(curl -s -w "\n%{http_code}" -X POST \
            https://zgdaqbnpgrabbnljmiqy.supabase.co/functions/v1/live-score-updater \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 120)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "📊 HTTP Status: $http_code"
          echo "📝 Response Body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" = "200" ]; then
            echo "✅ Live score updater succeeded"
          else
            echo "❌ Live score updater failed with status $http_code"
            echo "This is not critical - continuing workflow"
          fi

      - name: Call update-game-stats Edge Function
        if: steps.determine-function.outputs.function == 'update-game-stats' || steps.determine-function.outputs.function == 'both'
        run: |
          echo "🔄 Calling update-game-stats..."

          response=$(curl -s -w "\n%{http_code}" -X POST \
            https://zgdaqbnpgrabbnljmiqy.supabase.co/functions/v1/update-game-stats \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 120)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "📊 HTTP Status: $http_code"
          echo "📝 Response Body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" = "200" ]; then
            echo "✅ Game stats updater succeeded"
          else
            echo "❌ Game stats updater failed with status $http_code"
            echo "This is not critical - continuing workflow"
          fi
